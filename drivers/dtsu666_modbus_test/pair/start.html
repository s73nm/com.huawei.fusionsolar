<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      color: #1a1a1a;
      background: transparent;
    }

    h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }

    p.subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .field { margin-bottom: 16px; }

    .field-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }

    input:focus { border-color: #CF0A2C; }

    .hint { font-size: 12px; color: #999; margin-top: 5px; line-height: 1.4; }

    .status {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }

    .status.success { background: #edf7f1; border: 1px solid #b2dfcb; color: #1a6638; display: block; }
    .status.error   { background: #fdf0ee; border: 1px solid #f5c2ba; color: #8b1a0e; display: block; }

    .kpi-row {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .kpi {
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .kpi-label { font-size: 11px; color: #888; }
    .kpi-value { font-size: 18px; font-weight: 700; }
    .kpi-unit  { font-size: 11px; color: #888; }

    button.primary {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #CF0A2C;
      color: #fff;
      transition: opacity 0.15s;
    }

    button.primary:disabled { opacity: 0.45; cursor: default; }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h2 id="title">DTSU666 Power Meter (TEST)</h2>
  <p class="subtitle" id="subtitle">Enter the network address of your SUN2000 inverter or SDongle that the DTSU666 smart meter is connected to.</p>

  <div class="field">
    <label id="label-name">Device name</label>
    <input type="text" id="name" value="DTSU666 Power Meter TEST (Modbus)" />
  </div>

  <div class="field-row">
    <div>
      <label id="label-address">IP Address</label>
      <input type="text" id="address" placeholder="192.168.1.x" />
    </div>
    <div>
      <label id="label-port">Port</label>
      <input type="number" id="port" value="502" min="1" max="65535" />
    </div>
  </div>
  <p class="hint" id="hint-port" style="margin-top:-10px; margin-bottom:16px;"></p>

  <div class="field">
    <label id="label-modbus-id">Modbus Unit ID</label>
    <input type="number" id="modbus-id" value="1" min="1" max="247" />
    <p class="hint" id="hint-modbus-id"></p>
  </div>

  <div class="status" id="status">
    <span id="status-text"></span>
    <div class="kpi-row" id="kpi-row">
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-power">Active Power</div>
        <div class="kpi-value" id="kpi-power">—</div>
        <div class="kpi-unit">W</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-import">Grid Import</div>
        <div class="kpi-value" id="kpi-import">—</div>
        <div class="kpi-unit">kWh</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-export">Grid Export</div>
        <div class="kpi-value" id="kpi-export">—</div>
        <div class="kpi-unit">kWh</div>
      </div>
    </div>
  </div>

  <button class="primary" id="btn" onclick="connect()">
    <span id="btn-label">Test connection</span>
  </button>

  <script>
    const i18n = {
      en: {
        title: 'DTSU666 Power Meter (TEST)',
        subtitle: 'Enter the network address of your SUN2000 inverter or SDongle that the DTSU666 smart meter is connected to.',
        labelName: 'Device name',
        labelAddress: 'IP Address',
        labelPort: 'Port',
        hintPort: 'Default 502. SDongle typically uses 6607.',
        labelModbusId: 'Modbus Unit ID',
        hintModbusId: 'Same Modbus unit ID as the SUN2000 inverter (default: 1).',
        btnTest: 'Connect',
        btnConnecting: 'Connecting…',
        btnAdding: 'Adding device…',
        defaultName: 'DTSU666 Power Meter TEST (Modbus)',
        labelPower: 'Active Power',
        labelImport: 'Grid Import',
        labelExport: 'Grid Export',
        errNoAddress: 'Please enter an IP address.',
        successMsg: '✓ Power meter detected',
      },
      de: {
        title: 'DTSU666 Energiezähler (TEST)',
        subtitle: 'Gib die Netzwerkadresse des SUN2000 Wechselrichters oder SDongle ein, an dem der DTSU666 angeschlossen ist.',
        labelName: 'Gerätename',
        labelAddress: 'IP-Adresse',
        labelPort: 'Port',
        hintPort: 'Standard 502. SDongle verwendet typischerweise 6607.',
        labelModbusId: 'Modbus Geräte-ID',
        hintModbusId: 'Dieselbe Modbus Geräte-ID wie beim SUN2000 Wechselrichter (Standard: 1).',
        btnTest: 'Verbinden',
        btnConnecting: 'Verbinde…',
        btnAdding: 'Gerät wird hinzugefügt…',
        defaultName: 'DTSU666 Energiezähler TEST (Modbus)',
        labelPower: 'Wirkleistung',
        labelImport: 'Netzbezug',
        labelExport: 'Netzeinspeisung',
        errNoAddress: 'Bitte gib eine IP-Adresse ein.',
        successMsg: '✓ Energiezähler erkannt',
      },
    };

    const lang = navigator.language.startsWith('de') ? 'de' : 'en';
    const t = i18n[lang];

    document.getElementById('title').textContent           = t.title;
    document.getElementById('subtitle').textContent        = t.subtitle;
    document.getElementById('label-name').textContent      = t.labelName;
    document.getElementById('label-address').textContent   = t.labelAddress;
    document.getElementById('label-port').textContent      = t.labelPort;
    document.getElementById('hint-port').textContent       = t.hintPort;
    document.getElementById('label-modbus-id').textContent = t.labelModbusId;
    document.getElementById('hint-modbus-id').textContent  = t.hintModbusId;
    document.getElementById('btn-label').textContent       = t.btnTest;
    document.getElementById('name').value                  = t.defaultName;
    document.getElementById('kpi-label-power').textContent  = t.labelPower;
    document.getElementById('kpi-label-import').textContent = t.labelImport;
    document.getElementById('kpi-label-export').textContent = t.labelExport;

    async function connect() {
      const address  = document.getElementById('address').value.trim();
      const port     = document.getElementById('port').value.trim();
      const modbusId = document.getElementById('modbus-id').value.trim();
      const name     = document.getElementById('name').value.trim() || t.defaultName;
      const btn      = document.getElementById('btn');
      const lbl      = document.getElementById('btn-label');

      if (!address) {
        showStatus('error', t.errNoAddress);
        return;
      }

      btn.disabled = true;
      lbl.innerHTML = '<span class="spinner"></span>' + t.btnConnecting;
      document.getElementById('status').className = 'status';

      try {
        const result = await Homey.emit('connect', { address, port, modbusId, name });

        if (!result || !result.success) {
          throw new Error('Unexpected response from app');
        }

        const kpi = result.kpi || {};
        document.getElementById('kpi-power').textContent  = kpi.powerMeterActivePower ?? '—';
        document.getElementById('kpi-import').textContent = kpi.gridAccumulatedEnergy  ?? '—';
        document.getElementById('kpi-export').textContent = kpi.gridExportedEnergy     ?? '—';

        document.getElementById('kpi-row').style.display = 'grid';
        showStatus('success', t.successMsg);

        lbl.innerHTML = '<span class="spinner"></span>' + t.btnAdding;

        const deviceId = `dtsu666_test:${address}:${port}:${modbusId}`;

        await Homey.createDevice({
          name: name,
          data: { id: deviceId },
          settings: {
            address,
            port:          parseInt(port, 10) || 502,
            modbus_id:     parseInt(modbusId, 10) || 1,
            poll_interval: 60,
          },
        });

        await Homey.done();

      } catch (err) {
        showStatus('error', '✗ ' + (err.message || 'Connection failed'));
        btn.disabled = false;
        lbl.textContent = t.btnTest;
      }
    }

    function showStatus(type, text) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      document.getElementById('status-text').textContent = text;
      if (type === 'error') {
        document.getElementById('kpi-row').style.display = 'none';
      }
    }
  </script>
</body>
</html>
