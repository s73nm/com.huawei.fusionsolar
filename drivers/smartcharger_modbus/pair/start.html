<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a; background: transparent; }
    h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    p.subtitle { font-size: 13px; color: #666; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    .field-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; color: #1a1a1a; outline: none; transition: border-color 0.15s; background: #fff; }
    input:focus { border-color: #CF0A2C; }
    .hint { font-size: 12px; color: #999; margin-top: 5px; line-height: 1.4; }
    .info-box { background: #eef4fb; border: 1px solid #b8d4ef; border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #1a4a7a; line-height: 1.6; margin-bottom: 20px; }
    .status { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .status.success { background: #edf7f1; border: 1px solid #b2dfcb; color: #1a6638; display: block; }
    .status.error   { background: #fdf0ee; border: 1px solid #f5c2ba; color: #8b1a0e; display: block; }
    .kpi-row { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .kpi { background: rgba(0,0,0,0.04); border-radius: 6px; padding: 8px 10px; }
    .kpi-label { font-size: 11px; color: #888; }
    .kpi-value { font-size: 18px; font-weight: 700; }
    .kpi-unit  { font-size: 11px; color: #888; }
    .kpi-model { background: rgba(0,0,0,0.04); border-radius: 6px; padding: 8px 10px; margin-top: 8px; font-size: 13px; color: #555; }
    button.primary { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #CF0A2C; color: #fff; transition: opacity 0.15s; }
    button.primary:disabled { opacity: 0.45; cursor: default; }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h2 id="title">Smart Charger</h2>
  <p class="subtitle" id="subtitle">Enter the network address of your Huawei Smart Charger.</p>

  <div class="info-box" id="info-box"></div>

  <div class="field">
    <label id="label-name">Device name</label>
    <input type="text" id="name" value="Smart Charger" />
  </div>

  <div class="field-row">
    <div>
      <label id="label-address">IP Address</label>
      <input type="text" id="address" placeholder="192.168.1.x" />
    </div>
    <div>
      <label id="label-port">Port</label>
      <input type="number" id="port" value="502" min="1" max="65535" />
    </div>
  </div>
  <p class="hint" id="hint-port" style="margin-top:-10px; margin-bottom:16px;"></p>

  <div class="field">
    <label id="label-modbus-id">Modbus Unit ID</label>
    <input type="number" id="modbus-id" value="1" min="1" max="247" />
    <p class="hint" id="hint-modbus-id"></p>
  </div>

  <div class="status" id="status">
    <span id="status-text"></span>
    <div id="kpi-model" class="kpi-model" style="display:none;"></div>
    <div class="kpi-row" id="kpi-row">
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-rated">Rated Power</div>
        <div class="kpi-value" id="kpi-rated">—</div>
        <div class="kpi-unit">kW</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-total">Total Charged</div>
        <div class="kpi-value" id="kpi-total">—</div>
        <div class="kpi-unit">kWh</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-temp">Temperature</div>
        <div class="kpi-value" id="kpi-temp">—</div>
        <div class="kpi-unit">°C</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-voltage">Phase A Voltage</div>
        <div class="kpi-value" id="kpi-voltage">—</div>
        <div class="kpi-unit">V</div>
      </div>
    </div>
  </div>

  <button class="primary" id="btn" onclick="connect()">
    <span id="btn-label">Connect</span>
  </button>

  <script>
    const i18n = {
      en: {
        title: 'Smart Charger',
        subtitle: 'Enter the network address of your Huawei Smart Charger.',
        infoBox: '📡 Connection info:\n• Default Modbus port: 502\n• Make sure the charger is connected to the same network as Homey.\n• Modbus Unit ID is typically 1.',
        labelName: 'Device name', labelAddress: 'IP Address', labelPort: 'Port',
        hintPort: 'Default Modbus port: 502.',
        labelModbusId: 'Modbus Unit ID',
        hintModbusId: 'Modbus unit ID of the charger (default: 1).',
        btnTest: 'Connect', btnConnecting: 'Connecting…', btnAdding: 'Adding device…',
        defaultName: 'Smart Charger (EMMA Modbus)',
        kpiRated: 'Rated Power', kpiTotal: 'Total Charged', kpiTemp: 'Temperature', kpiVoltage: 'Phase A Voltage',
        errNoAddress: 'Please enter an IP address.',
        successMsg: '✓ Connected',
      },
      de: {
        title: 'Smart Charger',
        subtitle: 'Gib die Netzwerkadresse deines Huawei Smart Chargers ein.',
        infoBox: '📡 Verbindungsinfo:\n• Standard Modbus Port: 502\n• Stelle sicher, dass der Charger mit demselben Netzwerk wie Homey verbunden ist.\n• Modbus Geräte-ID ist typischerweise 1.',
        labelName: 'Gerätename', labelAddress: 'IP-Adresse', labelPort: 'Port',
        hintPort: 'Standard Modbus Port: 502.',
        labelModbusId: 'Modbus Geräte-ID',
        hintModbusId: 'Modbus Geräte-ID des Chargers (Standard: 1).',
        btnTest: 'Verbinden', btnConnecting: 'Verbinde…', btnAdding: 'Gerät wird hinzugefügt…',
        defaultName: 'Smart Charger (EMMA Modbus)',
        kpiRated: 'Nennleistung', kpiTotal: 'Gesamtgeladene Energie', kpiTemp: 'Temperatur', kpiVoltage: 'Phase A Spannung',
        errNoAddress: 'Bitte gib eine IP-Adresse ein.',
        successMsg: '✓ Verbunden',
      },
    };

    const lang = navigator.language.startsWith('de') ? 'de' : 'en';
    const t = i18n[lang];

    document.getElementById('title').textContent           = t.title;
    document.getElementById('subtitle').textContent        = t.subtitle;
    document.getElementById('info-box').innerText          = t.infoBox;
    document.getElementById('label-name').textContent      = t.labelName;
    document.getElementById('label-address').textContent   = t.labelAddress;
    document.getElementById('label-port').textContent      = t.labelPort;
    document.getElementById('hint-port').textContent       = t.hintPort;
    document.getElementById('label-modbus-id').textContent = t.labelModbusId;
    document.getElementById('hint-modbus-id').textContent  = t.hintModbusId;
    document.getElementById('btn-label').textContent       = t.btnTest;
    document.getElementById('name').value                  = t.defaultName;
    document.getElementById('kpi-label-rated').textContent   = t.kpiRated;
    document.getElementById('kpi-label-total').textContent   = t.kpiTotal;
    document.getElementById('kpi-label-temp').textContent    = t.kpiTemp;
    document.getElementById('kpi-label-voltage').textContent = t.kpiVoltage;

    async function connect() {
      const address  = document.getElementById('address').value.trim();
      const port     = document.getElementById('port').value.trim();
      const modbusId = document.getElementById('modbus-id').value.trim();
      const name     = document.getElementById('name').value.trim() || t.defaultName;
      const btn = document.getElementById('btn');
      const lbl = document.getElementById('btn-label');

      if (!address) { showStatus('error', t.errNoAddress); return; }

      btn.disabled = true;
      lbl.innerHTML = '<span class="spinner"></span>' + t.btnConnecting;
      document.getElementById('status').className = 'status';

      try {
        const result = await Homey.emit('connect', { address, port, modbusId, name });
        if (!result?.success) throw new Error('Unexpected response from app');

        const kpi = result.kpi || {};
        document.getElementById('kpi-rated').textContent   = kpi.ratedPower         ?? '—';
        document.getElementById('kpi-total').textContent   = kpi.totalEnergyCharged ?? '—';
        document.getElementById('kpi-temp').textContent    = kpi.chargerTemperature  ?? '—';
        document.getElementById('kpi-voltage').textContent = kpi.phaseAVoltage       ?? '—';

        if (result.offeringName) {
          const modelEl = document.getElementById('kpi-model');
          modelEl.textContent = result.offeringName;
          modelEl.style.display = 'block';
        }

        document.getElementById('kpi-row').style.display = 'grid';
        showStatus('success', t.successMsg);
        lbl.innerHTML = '<span class="spinner"></span>' + t.btnAdding;

        await Homey.createDevice({
          name,
          data: { id: `${address}:${port}:${modbusId}` },
          settings: {
            address,
            port:          parseInt(port, 10) || 502,
            modbus_id:     parseInt(modbusId, 10) || 1,
            poll_interval: 30,
          },
        });

        await Homey.done();

      } catch (err) {
        showStatus('error', '✗ ' + (err.message || 'Connection failed'));
        btn.disabled = false;
        lbl.textContent = t.btnTest;
      }
    }

    function showStatus(type, text) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      document.getElementById('status-text').textContent = text;
      if (type === 'error') {
        document.getElementById('kpi-row').style.display = 'none';
        document.getElementById('kpi-model').style.display = 'none';
      }
    }
  </script>
</body>
</html>
