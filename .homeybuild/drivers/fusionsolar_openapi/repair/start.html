<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 24px; color: #1a1a1a; background: transparent; }
    h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    p.subtitle { font-size: 13px; color: #666; margin-bottom: 24px; line-height: 1.5; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; color: #1a1a1a; outline: none; transition: border-color 0.15s; background: #fff; }
    input:focus { border-color: #CF0A2C; }
    .hint { font-size: 12px; color: #999; margin-top: 5px; line-height: 1.4; }
    .status { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .status.success { background: #edf7f1; border: 1px solid #b2dfcb; color: #1a6638; display: block; }
    .status.error   { background: #fdf0ee; border: 1px solid #f5c2ba; color: #8b1a0e; display: block; }
    button.primary { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #CF0A2C; color: #fff; transition: opacity 0.15s; }
    button.primary:disabled { opacity: 0.45; cursor: default; }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h2 id="title">Repair FusionSolar OpenAPI</h2>
  <p class="subtitle" id="subtitle">Update your FusionSolar Northbound API credentials.</p>

  <div class="field">
    <label id="label-url">Server URL</label>
    <input type="text" id="base-url" value="https://eu5.fusionsolar.huawei.com" />
    <p class="hint" id="hint-url"></p>
  </div>

  <div class="field">
    <label id="label-username">Username</label>
    <input type="text" id="username" autocomplete="username" />
  </div>

  <div class="field">
    <label id="label-password">System Code</label>
    <input type="password" id="system-code" autocomplete="current-password" />
    <p class="hint" id="hint-password"></p>
  </div>

  <div class="status" id="status"><span id="status-text"></span></div>

  <button class="primary" id="btn" onclick="save()">
    <span id="btn-label">Test & Save</span>
  </button>

  <script>
    const i18n = {
      en: {
        title: 'Repair FusionSolar OpenAPI',
        subtitle: 'Update your FusionSolar Northbound API credentials.',
        labelUrl: 'Server URL',
        hintUrl: 'Regional server. EU default: eu5.fusionsolar.huawei.com',
        labelUsername: 'Username',
        labelPassword: 'System Code',
        hintPassword: 'The system code (API password) from your FusionSolar account.',
        btnSave: 'Test & Save', btnSaving: 'Testing…',
        successMsg: '✓ Login verified — settings saved.',
      },
      de: {
        title: 'FusionSolar OpenAPI reparieren',
        subtitle: 'Aktualisiere deine FusionSolar Northbound API-Zugangsdaten.',
        labelUrl: 'Server URL',
        hintUrl: 'Regionaler Server. EU Standard: eu5.fusionsolar.huawei.com',
        labelUsername: 'Benutzername',
        labelPassword: 'System Code',
        hintPassword: 'Der System Code (API-Passwort) aus deinem FusionSolar-Konto.',
        btnSave: 'Testen & Speichern', btnSaving: 'Teste…',
        successMsg: '✓ Anmeldung bestätigt — Einstellungen gespeichert.',
      },
    };

    const lang = navigator.language.startsWith('de') ? 'de' : 'en';
    const t = i18n[lang];

    document.getElementById('title').textContent          = t.title;
    document.getElementById('subtitle').textContent       = t.subtitle;
    document.getElementById('label-url').textContent      = t.labelUrl;
    document.getElementById('hint-url').textContent       = t.hintUrl;
    document.getElementById('label-username').textContent = t.labelUsername;
    document.getElementById('label-password').textContent = t.labelPassword;
    document.getElementById('hint-password').textContent  = t.hintPassword;
    document.getElementById('btn-label').textContent      = t.btnSave;

    Homey.getDeviceSettings().then((s) => {
      if (s.base_url)  document.getElementById('base-url').value  = s.base_url;
      if (s.username)  document.getElementById('username').value  = s.username;
      // system_code intentionally not pre-filled (password field)
    }).catch(() => {});

    async function save() {
      const baseUrl    = document.getElementById('base-url').value.trim();
      const username   = document.getElementById('username').value.trim();
      const systemCode = document.getElementById('system-code').value;
      const btn = document.getElementById('btn');
      const lbl = document.getElementById('btn-label');

      btn.disabled = true;
      lbl.innerHTML = '<span class="spinner"></span>' + t.btnSaving;
      document.getElementById('status').className = 'status';

      try {
        const result = await Homey.emit('login', { baseUrl, username, systemCode });
        if (!result?.success) throw new Error('Unexpected response');
        showStatus('success', t.successMsg);
        setTimeout(() => Homey.done(), 1000);
      } catch (err) {
        showStatus('error', '✗ ' + (err.message || 'Login failed'));
        btn.disabled = false;
        lbl.textContent = t.btnSave;
      }
    }

    function showStatus(type, text) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      document.getElementById('status-text').textContent = text;
    }
  </script>
</body>
</html>
