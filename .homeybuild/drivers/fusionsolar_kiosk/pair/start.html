<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      color: #1a1a1a;
      background: transparent;
    }

    h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }

    p.subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }

    input:focus { border-color: #CF0A2C; }

    .hint { font-size: 12px; color: #999; margin-top: 5px; line-height: 1.4; }

    .status {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }

    .status.success { background: #edf7f1; border: 1px solid #b2dfcb; color: #1a6638; display: block; }
    .status.error   { background: #fdf0ee; border: 1px solid #f5c2ba; color: #8b1a0e; display: block; }

    .kpi-row {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .kpi {
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .kpi-label { font-size: 11px; color: #888; }
    .kpi-value { font-size: 18px; font-weight: 700; }
    .kpi-unit  { font-size: 11px; color: #888; }

    button.primary {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #CF0A2C;
      color: #fff;
      transition: opacity 0.15s;
    }

    button.primary:disabled { opacity: 0.45; cursor: default; }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h2 id="title">FusionSolar Plant</h2>
  <p class="subtitle" id="subtitle">Enter your Kiosk URL to connect your plant to Homey.</p>

  <div class="field">
    <label id="label-name">Plant name</label>
    <input type="text" id="name" value="FusionSolar Plant" />
  </div>

  <div class="field">
    <label id="label-url">Kiosk URL</label>
    <input type="url" id="url"
      placeholder="https://region.fusionsolar.huawei.com/...#/kiosk?kk=..." />
    <p class="hint" id="hint-url">Found in FusionSolar under Share → Kiosk URL.</p>
  </div>

  <div class="status" id="status">
    <span id="status-text"></span>
    <div class="kpi-row" id="kpi-row">
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-power">Current power</div>
        <div class="kpi-value" id="kpi-power">—</div>
        <div class="kpi-unit">W</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-daily">Today</div>
        <div class="kpi-value" id="kpi-daily">—</div>
        <div class="kpi-unit">kWh</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-month">This month</div>
        <div class="kpi-value" id="kpi-month">—</div>
        <div class="kpi-unit">kWh</div>
      </div>
      <div class="kpi">
        <div class="kpi-label" id="kpi-label-total">Total</div>
        <div class="kpi-value" id="kpi-total">—</div>
        <div class="kpi-unit">kWh</div>
      </div>
    </div>
  </div>

  <button class="primary" id="btn" onclick="connect()">
    <span id="btn-label">Test connection</span>
  </button>

  <script>
    const i18n = {
      en: {
        title: 'FusionSolar Plant',
        subtitle: 'Enter your Kiosk URL to connect your plant to Homey.',
        labelName: 'Plant name',
        labelUrl: 'Kiosk URL',
        hintUrl: 'Found in FusionSolar under Share → Kiosk URL.',
        btnTest: 'Connect',
        btnConnecting: 'Connecting…',
        btnAdding: 'Adding device…',
        defaultName: 'FusionSolar Plant (Kiosk)',
        labelPower: 'Current power',
        labelDaily: 'Today',
        labelMonth: 'This month',
        labelTotal: 'Total',
        errNoUrl: 'Please enter a Kiosk URL.',
        successMsg: '✓ Connected',
      },
      de: {
        title: 'FusionSolar Anlage',
        subtitle: 'Gib deine Kiosk URL ein, um die Anlage mit Homey zu verbinden.',
        labelName: 'Anlagenname',
        labelUrl: 'Kiosk URL',
        hintUrl: 'Zu finden in FusionSolar unter Teilen → Kiosk URL.',
        btnTest: 'Verbinden',
        btnConnecting: 'Verbinde…',
        btnAdding: 'Gerät wird hinzugefügt…',
        defaultName: 'FusionSolar Anlage (Kiosk)',
        labelPower: 'Aktuelle Leistung',
        labelDaily: 'Heute',
        labelMonth: 'Dieser Monat',
        labelTotal: 'Gesamt',
        errNoUrl: 'Bitte gib eine Kiosk URL ein.',
        successMsg: '✓ Verbunden',
      },
    };

    const lang = navigator.language.startsWith('de') ? 'de' : 'en';
    const t = i18n[lang];

    document.getElementById('title').textContent           = t.title;
    document.getElementById('subtitle').textContent        = t.subtitle;
    document.getElementById('label-name').textContent      = t.labelName;
    document.getElementById('label-url').textContent       = t.labelUrl;
    document.getElementById('hint-url').textContent        = t.hintUrl;
    document.getElementById('btn-label').textContent       = t.btnTest;
    document.getElementById('name').value                  = t.defaultName;
    document.getElementById('kpi-label-power').textContent = t.labelPower;
    document.getElementById('kpi-label-daily').textContent = t.labelDaily;
    document.getElementById('kpi-label-month').textContent = t.labelMonth;
    document.getElementById('kpi-label-total').textContent = t.labelTotal;

    async function connect() {
      const url  = document.getElementById('url').value.trim();
      const name = document.getElementById('name').value.trim() || t.defaultName;
      const btn  = document.getElementById('btn');
      const lbl  = document.getElementById('btn-label');

      if (!url) {
        showStatus('error', t.errNoUrl);
        return;
      }

      btn.disabled = true;
      lbl.innerHTML = '<span class="spinner"></span>' + t.btnConnecting;
      document.getElementById('status').className = 'status';

      try {
        // 1. Validate URL and fetch live data via the driver back-end
        const result = await Homey.emit('set_kiosk_url', { url, name });

        if (!result || !result.success) {
          throw new Error('Unexpected response from app');
        }

        // 2. Show live KPI values
        const kpi = result.kpi || {};
        document.getElementById('kpi-power').textContent = kpi.realTimePower   ?? '—';
        document.getElementById('kpi-daily').textContent = kpi.dailyEnergy     ?? '—';
        document.getElementById('kpi-month').textContent = kpi.monthEnergy     ?? '—';
        document.getElementById('kpi-total').textContent = kpi.cumulativeEnergy ?? '—';
        document.getElementById('kpi-row').style.display = 'grid';
        showStatus('success', t.successMsg);

        lbl.innerHTML = '<span class="spinner"></span>' + t.btnAdding;

        // 3. Create the device directly — no list_devices / add_devices template needed
        await Homey.createDevice({
          name: name,
          data: { id: result.kk },
          settings: {
            kiosk_url: url,
            poll_interval: 10,
          },
        });

        // 4. Close the pairing session
        await Homey.done();

      } catch (err) {
        showStatus('error', '✗ ' + (err.message || 'Connection failed'));
        btn.disabled = false;
        lbl.textContent = t.btnTest;
      }
    }

    function showStatus(type, text) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      document.getElementById('status-text').textContent = text;
      if (type === 'error') document.getElementById('kpi-row').style.display = 'none';
    }
  </script>
</body>
</html>
